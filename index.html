<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Quest</title>
    <style>
        /* BASE RESET & LAYOUT */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a12;
            font-family: 'Courier New', monospace
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            cursor: none
        }

        /* MOBILE CONTROLS */
        #mobile-controls {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 12px;
            pointer-events: none
        }

        #mobile-controls button {
            pointer-events: auto;
            border: none;
            border-radius: 14px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            width: 70px;
            height: 70px;
            opacity: 0.5;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation
        }

        #mc-left, #mc-right {
            position: fixed;
            bottom: 18px
        }

        #mc-left {
            left: 18px;
            background: rgba(255, 255, 255, 0.13)
        }

        #mc-right {
            left: 100px;
            background: rgba(255, 255, 255, 0.13)
        }

        #mc-jump {
            position: fixed;
            bottom: 18px;
            right: 18px;
            background: rgba(100, 220, 255, 0.2);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 16px
        }

        @media (pointer: coarse) {
            #mobile-controls {
                display: block
            }
        }
    </style>
</head>

    <canvas id="gc"></canvas>

        <button id="mc-left">◀</button>
        <button id="mc-right">▶</button>

        const C = document.getElementById('gc');
        const X = C.getContext('2d');
        let W, H, SCALE;

        function resize() {
            W = C.width = window.innerWidth;
            H = C.height = window.innerHeight;
            SCALE = Math.min(W / 800, H / 600);
        }

        resize();
        window.addEventListener('resize', resize);

        // === AUDIO SYSTEM ===
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let actx;

        function initAudio() {
            if (!actx) actx = new AudioCtx();
        }

        function playTone(freq, dur, type, vol) {
            if (!actx) return;
            try {
                const o = actx.createOscillator(),
                    g = actx.createGain();
                o.type = type || 'square';
                o.frequency.setValueAtTime(freq, actx.currentTime);
                g.gain.setValueAtTime((vol || 0.15), actx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
                o.connect(g);
                g.connect(actx.destination);
                o.start();
                o.stop(actx.currentTime + dur);
            } catch (e) {}
        }

        function sfxJump() {
            playTone(400, 0.12, 'square', 0.1);
            setTimeout(() => playTone(600, 0.1, 'square', 0.08), 50);
        }

        function sfxCollect() {
            playTone(800, 0.08, 'sine', 0.15);
            setTimeout(() => playTone(1200, 0.12, 'sine', 0.12), 60);
            setTimeout(() => playTone(1600, 0.15, 'sine', 0.1), 120);
        }

        function sfxHit() {
            playTone(150, 0.3, 'sawtooth', 0.2);
            playTone(100, 0.4, 'square', 0.1);
        }

        function sfxPortal() {
            for (let i = 0; i < 5; i++)
                setTimeout(() => playTone(400 + i * 200, 0.2, 'sine', 0.1), i * 80);
        }

        function sfxGameOver() {
            playTone(300, 0.3, 'sawtooth', 0.15);
            setTimeout(() => playTone(200, 0.4, 'sawtooth', 0.12), 200);
            setTimeout(() => playTone(100, 0.6, 'sawtooth', 0.1), 400);
        }

        // === INPUT SYSTEM ===
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (['Space', 'ArrowUp', 'ArrowDown'].includes(e.code)) e.preventDefault();
            initAudio();
        });
        window.addEventListener('keyup', e => {
            keys[e.code] = false;
        });

        // Mobile
        const mbl = { left: false, right: false, jump: false };

        function setupMobile() {
            const bL = document.getElementById('mc-left'),
                bR = document.getElementById('mc-right'),
                bJ = document.getElementById('mc-jump');

            function t(el, prop) {
                el.addEventListener(
                    'touchstart',
                    e => {
                        e.preventDefault();
                        mbl[prop] = true;
                        initAudio();
                    },
                    { passive: false }
                );
                el.addEventListener(
                    'touchend',
                    e => {
                        e.preventDefault();
                        mbl[prop] = false;
                    },
                    { passive: false }
                );
                el.addEventListener('touchcancel', e => {
                    mbl[prop] = false;
                });
            }

            t(bL, 'left');
            t(bR, 'right');
            t(bJ, 'jump');
        }

        setupMobile();

        function inputLeft() {
            return keys['ArrowLeft'] || keys['KeyA'] || mbl.left;
        }

        function inputRight() {
            return keys['ArrowRight'] || keys['KeyD'] || mbl.right;
        }

        function inputJump() {
            return keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || mbl.jump;
        }

        function inputAny() {
            return keys['Space'] || keys['Enter'] || mbl.jump;

        class Particle {
            constructor(x, y, vx, vy, color, life, size) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.life = this.maxLife = life;
                this.size = size || 3;
            }

            update(dt) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.vy += 400 * dt;
                this.life -= dt;
            }

            draw() {
                const a = this.life / this.maxLife;
                X.globalAlpha = a;
                X.fillStyle = this.color;
                X.fillRect(this.x - CAM.x, this.y - CAM.y, this.size * a + 1, this.size * a + 1);
                X.globalAlpha = 1;
            }
        }

        function emitCollect(x, y) {
            const cols = ['#fff', '#0ff', '#ff0', '#f0f', '#0f0'];

                    sp = 80 + Math.random() * 200;
                particles.push(
                    new Particle(
                        x,
                        y,
                        Math.cos(a) * sp,
                        Math.sin(a) * sp - 100,
                        cols[i % cols.length],
                        0.5 + Math.random() * 0.5,
                        2 + Math.random() * 4
                    )
                );
            }
        }

        // === ENTITY CLASSES ===
        // Player
        const P = {
            x: 80,
            y: 600,
            vx: 0,
            vy: 0,

            h: 36,
            onGround: false,
            facing: 1,
            frame: 0,

            jumpHeld: false,
            reset(sx, sy) {

        // Runtime entities
        let platforms = [],
            movPlats = [],
            tokens = [],
            enemies = [],
            portal = null;

        function loadLevel(idx) {
            const L = LEVELS[idx];
            platforms = L.platforms.map(p => ({ ...p }));
            movPlats = L.movingPlatforms.map(p => ({ ...p, dir: 1, ox: p.x }));
            tokens = L.tokens.map((t, i) => ({ x: t.x, y: t.y, collected: false, bobOffset: Math.random() * Math.PI * 2 }));
            enemies = L.enemies.map(e => ({ x: e.x, y: e.y, w: e.w || 100, spd: e.spd || 60, dir: 1, ox: e.x, frame: 0 }));
            portal = { x: L.portal.x, y: L.portal.y, active: false, pulse: 0 };
            G.tokensCollected = 0;
            G.tokensTotal = tokens.length;
            P.reset(L.playerStart.x, L.playerStart.y);
            CAM.x = P.x - W / 2;
            CAM.y = P.y - H / 2;
            CAM.tx = CAM.x;
            CAM.ty = CAM.y;
        }

        // Collision helpers
        function aabb(ax, ay, aw, ah, bx, by, bw, bh) {
            return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
        }

        function resolvePlayerPlatforms(dt) {
            P.onGround = false;
            const allPlats = [...platforms, ...movPlats];
            for (const pl of allPlats) {
                if (!aabb(P.x, P.y, P.w, P.h, pl.x, pl.y, pl.w, pl.h)) continue;

                // Check if landing on top
                const prevBottom = P.y + P.h - P.vy * dt;
                if (P.vy >= 0 && prevBottom <= pl.y + 4) {
                    P.y = pl.y - P.h;
                    P.vy = 0;
                    P.onGround = true;
                    if (pl.dir !== undefined) P.x += pl.spd * pl.dir * dt;
                } else if (P.vy < 0 && P.y < pl.y + pl.h && P.y + P.h > pl.y + pl.h - 4) {
                    // Hit head
                    P.y = pl.y + pl.h;
                    P.vy = 0;
                } else {
                    // Side collision
                    const overlapLeft = P.x + P.w - pl.x;
                    const overlapRight = pl.x + pl.w - P.x;
                    if (overlapLeft < overlapRight) {
                        P.x = pl.x - P.w;
                    } else {
                        P.x = pl.x + pl.w;
                    }
                    P.vx = 0;
                }
            }
        }

        function updatePlayer(dt) {
            // Horizontal
            if (inputLeft()) {
                P.vx -= MOVE_ACC * dt;
                P.facing = -1;
            }
            if (inputRight()) {
                P.vx += MOVE_ACC * dt;
                P.facing = 1;
            }
            if (!inputLeft() && !inputRight()) P.vx *= FRICTION;
            P.vx = Math.max(-MAX_VX, Math.min(MAX_VX, P.vx));

            // Jump
            const wantJump = inputJump();
            if (wantJump && !G.prevJump && P.onGround) {
                P.vy = JUMP_VEL;
                P.onGround = false;
                sfxJump();
            }
            G.prevJump = wantJump;

            // Gravity
            P.vy += GRAV * dt;
            if (P.vy > 800) P.vy = 800;
            P.x += P.vx * dt;
            P.y += P.vy * dt;

            // Resolve
            resolvePlayerPlatforms(dt);

            // World bounds
            const L = LEVELS[G.level];
            if (P.x < 0) {
                P.x = 0;
                P.vx = 0;
            }
            if (P.x + P.w > L.worldW) {
                P.x = L.worldW - P.w;
                P.vx = 0;
            }
            if (P.y > L.worldH + 100) {
                hitPlayer();
            }

            // Animation
            P.frameTimer += dt;
            if (P.onGround && Math.abs(P.vx) > 20) {
                if (P.frameTimer > 0.1) {
                    P.frame = (P.frame + 1) % 4;
                    P.frameTimer = 0;
                }
            } else if (P.onGround) {
                P.frame = 0;
            }

            // Invincibility
            if (P.invincible > 0) P.invincible -= dt;

            // Collect tokens
            for (const tk of tokens) {
                if (tk.collected) continue;
                if (aabb(P.x - 4, P.y - 4, P.w + 8, P.h + 8, tk.x, tk.y, 24, 24)) {
                    tk.collected = true;
                    G.tokensCollected++;
                    G.score += 100;
                    emitCollect(tk.x + 12, tk.y + 12);
                    sfxCollect();
                    showMotivation(tk.x + 12 - CAM.x, tk.y - CAM.y);
                    if (G.tokensCollected >= G.tokensTotal && portal) portal.active = true;
                }
            }

            // Portal
            if (portal && portal.active && aabb(P.x, P.y, P.w, P.h, portal.x, portal.y, 40, 50)) {
                sfxPortal();
                if (G.level < 2) {
                    G.level++;
                    G.state = 'levelIntro';
                    G.introTimer = 0;
                    G.score += 500;
                } else {
                    G.state = 'victory';
                    G.score += 1000;
                }
            }

            // Enemies
            if (P.invincible <= 0) {
                for (const en of enemies) {
                    if (aabb(P.x, P.y, P.w, P.h, en.x, en.y - 24, 30, 24)) {
                        hitPlayer();
                    }
                }
            }
        }

        function hitPlayer() {
            if (P.invincible > 0) return;
            G.lives--;
            sfxHit();
            P.invincible = 2;
            G.shakeTimer = 0.3;
            G.shakeIntensity = 8;
            P.vy = -300;
            emitHit(P.x + P.w / 2, P.y + P.h / 2);
            if (G.lives <= 0) {
                G.state = 'gameOver';
                sfxGameOver();
            }
        }

        function updateEnemies(dt) {
            for (const en of enemies) {
                en.x += en.spd * en.dir * dt;
                if (en.x > en.ox + en.w || en.x < en.ox) en.dir *= -1;
                en.frame += dt * 4;
            }
        }

        function updateMovPlats(dt) {
            for (const mp of movPlats) {
                mp.x += mp.spd * mp.dir * dt;
                if (mp.x > mp.bx) mp.dir = -1;
                if (mp.x < mp.ax) mp.dir = 1;
            }
        }

        // === RENDERING ===
        function drawBG() {
            const L = LEVELS[G.level];
            const g = X.createLinearGradient(0, 0, 0, H);
            L.skyGrad.forEach((c, i) => g.addColorStop(i / (L.skyGrad.length - 1), c));
            X.fillStyle = g;
            X.fillRect(0, 0, W, H);

            // Parallax layer 1 — distant
            const px1 = -CAM.x * 0.1;
            if (L.bgElements === 'trees') {
                drawTrees(px1, 0.4, L);
            } else if (L.bgElements === 'dataStreams') {
                drawDataStreams(px1, L);
            } else if (L.bgElements === 'lava') {
                drawLava(px1, L);
            }

            // Parallax layer 2 — mid
            const px2 = -CAM.x * 0.3;
            if (L.bgElements === 'trees') {
                drawTrees(px2, 0.7, L);
            }
        }

        function drawTrees(offx, a, L) {
            X.globalAlpha = a * 0.5;
            for (let i = 0; i < 20; i++) {
                const tx = (i * 200 + offx) % W - 50;
                const ty = H * 0.5 + Math.sin(i * 1.5) * 40;
                X.fillStyle = '#1a3a1a';
                X.beginPath();
                X.moveTo(tx, ty);
                X.lineTo(tx + 30, ty - 80 - ((i % 3) * 20));
                X.lineTo(tx + 60, ty);
                X.fill();
                X.fillStyle = '#2a2214';
                X.fillRect(tx + 24, ty, 12, 30);
            }
            X.globalAlpha = 1;
        }

        function drawDataStreams(offx, L) {
            X.globalAlpha = 0.15;
            for (let i = 0; i < 15; i++) {
                const sx = (i * 280 + offx) % W;
                X.strokeStyle = '#3af';
                X.lineWidth = 1;
                X.beginPath();
                X.moveTo(sx, 0);
                for (let j = 0; j < H; j += 40) {
                    X.lineTo(sx + Math.sin(j * 0.02 + G.time * 2 + i) * 30, j);
                }
                X.stroke();
            }
            X.globalAlpha = 1;
        }

        function drawLava(offx, L) {
            X.globalAlpha = 0.2;
            for (let i = 0; i < W; i += 60) {
                const ly = H - 40 + Math.sin((i + offx) * 0.01 + G.time * 3) * 15;
                X.fillStyle = '#f42';
                X.fillRect(i, ly, 60, H - ly);
                X.fillStyle = '#fa0';
                X.fillRect(i, ly, 60, 4);
            }
            X.globalAlpha = 1;
        }

        function drawPlatforms() {
            const L = LEVELS[G.level];
            const allP = [...platforms, ...movPlats];
            for (const p of allP) {
                const px = p.x - CAM.x,
                    py = p.y - CAM.y;

                // Body
                X.fillStyle = L.platformColor;
                X.fillRect(px, py, p.w, p.h);

                // Top highlight
                X.fillStyle = L.platformTop;
                X.fillRect(px, py, p.w, 4);

                // Pixel detail
                X.fillStyle = 'rgba(255,255,255,0.08)';
                for (let i = 0; i < p.w; i += 8) {
                    X.fillRect(px + i, py + 4, 4, 4);
                }
            }
        }

        function drawTokens() {
            const L = LEVELS[G.level];
            for (const tk of tokens) {
                if (tk.collected) continue;
                const tx = tk.x - CAM.x,
                    ty = tk.y - CAM.y + Math.sin(G.time * 3 + tk.bobOffset) * 6;

                // Glow
                const grd = X.createRadialGradient(tx + 12, ty + 12, 2, tx + 12, ty + 12, 20);
                grd.addColorStop(0, 'rgba(255,255,100,0.4)');
                grd.addColorStop(1, 'rgba(255,255,0,0)');
                X.fillStyle = grd;
                X.fillRect(tx - 8, ty - 8, 40, 40);

                // Coin body — squash for spin effect
                const spin = Math.cos(G.time * 4 + tk.bobOffset);
                const cw = Math.abs(spin) * 20 + 4;
                X.fillStyle = '#fd0';
                X.beginPath();
                X.ellipse(tx + 12, ty + 12, cw / 2, 12, 0, 0, Math.PI * 2);
                X.fill();
                X.strokeStyle = '#a80';
                X.lineWidth = 2;
                X.stroke();

                // AI text
                if (cw > 10) {
                    X.fillStyle = '#840';
                    X.font = 'bold 9px monospace';
                    X.textAlign = 'center';
                    X.fillText('AI', tx + 12, ty + 16);
                }

                // Circuit lines
                X.strokeStyle = 'rgba(255,200,0,0.5)';
                X.lineWidth = 1;
                X.beginPath();
                X.moveTo(tx + 12, ty);
                X.lineTo(tx + 12, ty - 6);
                X.moveTo(tx, ty + 12);
                X.lineTo(tx - 6, ty + 12);
                X.stroke();
            }
        }

        function drawPlayer() {
            if (P.invincible > 0 && Math.floor(P.invincible * 10) % 2 === 0) return;

            const px = P.x - CAM.x,
                py = P.y - CAM.y;
            const f = P.facing;

            // Body
            X.fillStyle = '#4a9fff';
            X.fillRect(px + 4, py + 10, 20, 16);

            // Head
            X.fillStyle = '#fbd';
            X.fillRect(px + 6, py, 16, 14);

            // Eyes
            const ex = f === 1 ? 4 : 0;
            X.fillStyle = '#222';
            X.fillRect(px + 10 + ex, py + 4, 3, 4);
            X.fillRect(px + 16 + ex, py + 4, 3, 4);

            // Hair
            X.fillStyle = '#642';
            X.fillRect(px + 5, py - 2, 18, 5);

            // Legs — animated
            X.fillStyle = '#36d';
            if (!P.onGround) {
                X.fillRect(px + 6, py + 26, 6, 10);
                X.fillRect(px + 16, py + 26, 6, 10);
            } else if (Math.abs(P.vx) > 20) {
                const legOff = Math.sin((P.frame * Math.PI) / 2) * 4;
                X.fillRect(px + 6, py + 26, 6, 10 + legOff);
                X.fillRect(px + 16, py + 26, 6, 10 - legOff);
            } else {
                X.fillRect(px + 6, py + 26, 6, 10);
                X.fillRect(px + 16, py + 26, 6, 10);
            }

            // Shoes
            X.fillStyle = '#c22';
            X.fillRect(px + 4, py + 34, 8, 4);
            X.fillRect(px + 16, py + 34, 8, 4);

            // Arm
            X.fillStyle = '#4a9fff';
            if (Math.abs(P.vx) > 20) {
                const armOff = Math.sin((P.frame * Math.PI) / 2) * 3;
                X.fillRect(px + (f === 1 ? 22 : 0), py + 12 + armOff, 6, 10);
            } else {
                X.fillRect(px + (f === 1 ? 22 : 0), py + 14, 6, 10);
            }
        }

        function drawEnemies() {
            for (const en of enemies) {
                const ex = en.x - CAM.x,
                    ey = en.y - 24 - CAM.y;

                // Body
                X.fillStyle = '#d44';
                X.fillRect(ex + 4, ey + 4, 22, 16);

                // Head dome
                X.fillStyle = '#a33';
                X.fillRect(ex + 2, ey, 26, 8);

                // Eyes — LED
                X.fillStyle = '#ff0';
                X.fillRect(ex + 8, ey + 8, 4, 4);
                X.fillRect(ex + 18, ey + 8, 4, 4);

                // Legs (animated)
                const legF = Math.sin(en.frame * 2) * 3;
                X.fillStyle = '#822';
                X.fillRect(ex + 6, ey + 20, 5, 6 + legF);
                X.fillRect(ex + 19, ey + 20, 5, 6 - legF);

                // Antenna
                X.strokeStyle = '#f66';
                X.lineWidth = 2;
                X.beginPath();
                X.moveTo(ex + 15, ey);
                X.lineTo(ex + 15, ey - 8);
                X.stroke();
                X.fillStyle = '#f00';
                X.beginPath();
                X.arc(ex + 15, ey - 9, 3, 0, Math.PI * 2);
                X.fill();
            }
        }

        function drawPortal() {
            if (!portal) return;

            const px = portal.x - CAM.x,
                py = portal.y - CAM.y;
            portal.pulse += 0.05;
            const L = LEVELS[G.level];

            if (portal.active) {
                // Active portal — glowing
                const grd = X.createRadialGradient(px + 20, py + 25, 5, px + 20, py + 25, 40);
                grd.addColorStop(0, 'rgba(255,255,255,0.6)');
                grd.addColorStop(0.5, L.accent);
                grd.addColorStop(1, 'rgba(0,0,0,0)');
                X.fillStyle = grd;
                X.fillRect(px - 20, py - 15, 80, 80);

                // Swirl
                X.strokeStyle = '#fff';
                X.lineWidth = 2;
                for (let i = 0; i < 3; i++) {
                    const a = portal.pulse * 3 + (i * Math.PI * 2) / 3;
                    const r = 12 + Math.sin(portal.pulse * 2) * 4;
                    X.beginPath();
                    X.arc(px + 20, py + 25, r, a, a + 1.5);
                    X.stroke();
                }
            }

            // Frame
            X.strokeStyle = portal.active ? '#fff' : '#555';
            X.lineWidth = 3;
            X.strokeRect(px, py, 40, 50);
            X.fillStyle = portal.active ? 'rgba(255,255,255,0.1)' : 'rgba(100,100,100,0.1)';
            X.fillRect(px, py, 40, 50);

            // Label
            X.fillStyle = portal.active ? '#fff' : '#555';
            X.font = 'bold 9px monospace';
            X.textAlign = 'center';
            X.fillText(portal.active ? 'EXIT' : 'LOCKED', px + 20, py + 30);
        }

        function drawHUD() {
            const L = LEVELS[G.level];

            // Background bar
            X.fillStyle = 'rgba(0,0,0,0.5)';
            X.fillRect(0, 0, W, 44);
            X.fillStyle = 'rgba(255,255,255,0.05)';
            X.fillRect(0, 42, W, 2);

            // Level name
            X.fillStyle = L.accent;
            X.font = 'bold 14px monospace';
            X.textAlign = 'left';
            X.fillText('LV' + (G.level + 1) + ' ' + L.name, 12, 28);

            // Tokens
            X.fillStyle = '#fd0';
            X.font = 'bold 14px monospace';
            X.textAlign = 'center';
            X.fillText('AI: ' + G.tokensCollected + '/' + G.tokensTotal, W / 2, 28);

            // Lives
            X.textAlign = 'right';
            for (let i = 0; i < G.lives; i++) {
                X.fillStyle = '#f44';
                X.beginPath();
                const hx = W - 20 - i * 28,
                    hy = 22;
                X.moveTo(hx, hy - 4);
                X.bezierCurveTo(hx - 6, hy - 12, hx - 14, hy - 2, hx, hy + 6);
                X.bezierCurveTo(hx + 14, hy - 2, hx + 6, hy - 12, hx, hy - 4);
                X.fill();
            }

            // Score
            X.fillStyle = '#fff';
            X.font = '12px monospace';
            X.textAlign = 'right';
            X.fillText('SCORE:' + G.score, W - 100, 28);
        }

        // === GAME LOOP ===
        let lastTime = 0;

        function gameLoop(ts) {
            const dt = Math.min((ts - lastTime) / 1000, 0.05);
            lastTime = ts;
            G.time += dt;

            X.clearRect(0, 0, W, H);

            // Screen shake offset
            let sx = 0,
                sy = 0;
            if (G.shakeTimer > 0) {
                G.shakeTimer -= dt;
                sx = (Math.random() - 0.5) * G.shakeIntensity;
                sy = (Math.random() - 0.5) * G.shakeIntensity;
            }

            X.save();
            X.translate(sx, sy);

            switch (G.state) {
                case 'title':
                    drawTitle();
                    if (inputAny() && G.time > 0.5) {
                        G.state = 'levelIntro';
                        G.introTimer = 0;
                        G.level = 0;
                        G.lives = 3;
                        G.score = 0;
                        initAudio();
                    }
                    break;

                case 'levelIntro':
                    drawLevelIntro();
                    if (inputAny() && G.introTimer > 1.5) {
                        G.state = 'playing';
                        loadLevel(G.level);
                    }
                    break;

                case 'playing':
                    updateMovPlats(dt);
                    updatePlayer(dt);
                    updateEnemies(dt);

                    // Update particles
                    for (let i = particles.length - 1; i >= 0; i--) {
                        particles[i].update(dt);
                        if (particles[i].life <= 0) particles.splice(i, 1);
                    }

                    // Update toasts
                    for (let i = toasts.length - 1; i >= 0; i--) {
                        toasts[i].update(dt);
                        if (toasts[i].life <= 0) toasts.splice(i, 1);
                    }

                    // Camera
                    CAM.tx = P.x - W / 2 + P.w / 2;
                    CAM.ty = P.y - H / 2 + P.h / 2;
                    const L = LEVELS[G.level];
                    CAM.tx = Math.max(0, Math.min(CAM.tx, L.worldW - W));
                    CAM.ty = Math.max(0, Math.min(CAM.ty, L.worldH - H));
                    CAM.x += (CAM.tx - CAM.x) * 0.08;
                    CAM.y += (CAM.ty - CAM.y) * 0.08;

                    // Draw
                    drawBG();
                    drawPlatforms();
                    drawTokens();
                    drawPortal();
                    drawEnemies();
                    drawPlayer();
                    for (const p of particles) p.draw();
                    for (const t of toasts) t.draw();
                    drawHUD();
                    break;

                case 'gameOver':
                    drawGameOver();
                    if (inputAny() && G.time > 0.5) {
                        G.state = 'levelIntro';
                        G.introTimer = 0;
                        G.level = 0;
                        G.lives = 3;
                        G.score = 0;
                        G.time = 0;
                    }
                    break;

                case 'victory':
                    drawVictory();
                    if (inputAny() && G.time > 0.5) {
                        G.state = 'title';
                        G.time = 0;
                    }
                    break;
            }

            X.restore();
            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
